# =============================================================
# Project-wide configuration — ALL parameters live here.
# Never hardcode values in src/ files. Always read from here.
# =============================================================

project:
  name: "heart-risk-mlops"
  version: "1.0.0"
  random_seed: 42

data:
  source_url: "https://archive.ics.uci.edu/ml/machine-learning-databases/heart-disease/processed.cleveland.data"
  raw_path: "data/raw/heart.csv"
  processed_path: "data/processed/features.parquet"
  test_size: 0.2

features:
  numeric:
    - age
    - trestbps
    - chol
    - thalach
    - oldpeak
  categorical:
    - sex
    - cp
    - fbs
    - restecg
    - exang
    - slope
    - ca
    - thal
  target: "target"

model:
  name: "RandomForestClassifier"
  params:
    n_estimators: 150
    max_depth: 10
    min_samples_split: 5
    class_weight: "balanced"

mlflow:
  experiment_name: "heart-risk-classifier"
  model_name: "heart-risk-model"
  tracking_uri: "mlruns"

evaluation:
  primary_metric: "roc_auc"
  promotion_threshold: 0.80

retraining:
  drift_threshold: 0.15
  schedule: "weekly"