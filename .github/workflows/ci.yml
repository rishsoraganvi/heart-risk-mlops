name: MLOps CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v

      - name: Run ingestion
        run: python src/ingest.py

      - name: Run training and capture metrics
        run: python src/train.py 2>&1 | tee train_output.log

      - name: Extract and display metrics
        run: |
          echo "=== Model Performance Summary ==="
          grep "roc_auc\|accuracy\|f1\|recall\|precision" train_output.log

      - name: Save mlruns as CI artifact
        uses: actions/upload-artifact@v3
        with:
          name: mlruns-${{ github.sha }}
          path: mlruns/
          retention-days: 30

      - name: Run batch inference
        run: python src/batch_infer.py
      
      - name: Write best metrics to repo
        run: python src/report_metrics.py

      - name: Commit metrics report back to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add metrics_report.json
          git diff --staged --quiet || git commit -m "ci: update metrics_report.json [skip ci]"
          git push
          